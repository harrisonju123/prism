name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  zed:
    name: Zed (macOS)
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: zed-macos

      - name: Reconcile Cargo.toml
        run: ./scripts/reconcile-cargo.sh

      - name: Cargo check (zed)
        run: cargo check -p zed

      - name: Verify PrisM patches
        run: make verify-patches
