name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CXXFLAGS: "-std=c++17"

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            runner: macos-15
          - arch: x86_64
            runner: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93"
          targets: ${{ matrix.arch }}-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: prism-release-macos-${{ matrix.arch }}
          cache-all-crates: "true"

      - name: Cache npm global packages
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: npm-global-dmg-license-v1-${{ runner.os }}

      - name: Set up npm global prefix
        run: |
          mkdir -p ~/.npm-global
          npm config set prefix '~/.npm-global'
          echo "$HOME/.npm-global/bin" >> $GITHUB_PATH

      - name: Determine release channel
        run: script/determine-release-channel

      - name: Install cargo-bundle
        run: |
          if ! cargo bundle --help 2>&1 | grep -q "cargo-bundle v0.6.1-zed"; then
            cargo install cargo-bundle \
              --git https://github.com/zed-industries/cargo-bundle.git \
              --branch zed-deploy \
              --locked
          fi

      - name: Generate licenses
        env:
          ALLOW_MISSING_LICENSES: "1"
        run: script/generate-licenses

      - name: Build release binaries
        run: |
          export PRISM_RELEASE_CHANNEL=$(cat ide/zed/RELEASE_CHANNEL)
          export PRISM_BUNDLE=true
          cargo build --release --package zed --package cli --target ${{ matrix.arch }}-apple-darwin
          cargo build --release --package remote_server --target ${{ matrix.arch }}-apple-darwin

      - name: Install dmg tools
        run: npm install --global dmg-license minimist

      - name: Bundle macOS app
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_NOTARIZATION_KEY: ${{ secrets.APPLE_NOTARIZATION_KEY }}
          APPLE_NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
          APPLE_NOTARIZATION_ISSUER_ID: ${{ secrets.APPLE_NOTARIZATION_ISSUER_ID }}
          ALLOW_MISSING_LICENSES: "1"
        run: script/bundle-mac ${{ matrix.arch }}-apple-darwin

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Prism-${{ matrix.arch }}.dmg
          path: target/${{ matrix.arch }}-apple-darwin/release/dmg/Prism-${{ matrix.arch }}.dmg

  create-release:
    name: Create GitHub Release
    needs: [build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten artifacts
        run: find artifacts/ -mindepth 2 -type f -exec mv {} artifacts/ \;

      - name: Get version
        id: version
        run: echo "VERSION=${{ github.event.inputs.version || github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: PrisM ${{ steps.version.outputs.VERSION }}
          body: |
            ## PrisM ${{ steps.version.outputs.VERSION }}

            See [CHANGELOG.md](https://github.com/harrisonju123/PrisM/blob/main/CHANGELOG.md) for details.

            ### Downloads

            | Platform | Arch | Download |
            |----------|------|----------|
            | macOS | Apple Silicon (M1+) | Prism-aarch64.dmg |
            | macOS | Intel | Prism-x86_64.dmg |

            ### Install

            1. Download the `.dmg` for your Mac architecture
            2. Open the DMG and drag **PrisM** to your Applications folder
            3. Launch PrisM from Applications
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-pre') || contains(github.ref_name, '-nightly') }}
