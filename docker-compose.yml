services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: prism
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/seed.sql:/docker-entrypoint-initdb.d/99_seed.sql:ro

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native protocol
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: prism
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@prism.local
      PGADMIN_DEFAULT_PASSWORD: prism
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./scripts/pgadmin_servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  prism:
    build:
      context: .
      target: prism
    ports:
      - "9100:9100"
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      RUST_LOG: prism=info
      PRISM_CLICKHOUSE_URL: http://clickhouse:8123
      PRISM_CLICKHOUSE_DATABASE: prism
      PRISM_POSTGRES_URL: postgres://prism:prism@postgres:5432/prism
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./config/prism.toml:/app/prism.toml:ro

  uglyhat:
    build:
      context: .
      target: uglyhat
    ports:
      - "3001:3001"
    environment:
      RUST_LOG: uglyhat=info
      UGLYHAT_DB_PATH: /data/uglyhat.db
      UGLYHAT_ADDR: 0.0.0.0:3001
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:3001/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - uglyhat_data:/data

volumes:
  clickhouse_data:
  postgres_data:
  pgadmin_data:
  uglyhat_data:
