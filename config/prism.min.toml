# PrisM minimal config — no Docker required.
# Routes to a LiteLLM proxy using LITELLM_API_KEY + LITELLM_BASE_URL.
# No virtual keys / no budget tracking.
# Copy to config/prism.toml or run: make dev-min

[gateway]
address = "0.0.0.0:9100"

[keys]
enabled = false

# LiteLLM exposes an OpenAI-compatible API.
# Set LITELLM_BASE_URL to your company's LiteLLM endpoint (e.g. https://litellm.internal/v1)
# Set LITELLM_API_KEY to your team's key.
[providers.litellm]
api_key = "${LITELLM_API_KEY}"
api_base = "${LITELLM_BASE_URL}"

# ============================================================================
# Model Aliases — mapped to LiteLLM model IDs
# Organized by tier: 1=premium, 2=standard, 3=economy
# Prices shown as (input/output per 1M tokens)
# ============================================================================

# --- Tier 1: Premium ($5+/1M output) ---

[models.claude-opus-4-6]
provider = "litellm"
model = "claude-opus-4-6"
tier = 1
fallback = "claude-opus-4-5"

[models.claude-opus-4-5]
provider = "litellm"
model = "claude-opus-4-5-20251101"
tier = 1
fallback = "claude-sonnet-4-6"

[models.gpt-5-2]
